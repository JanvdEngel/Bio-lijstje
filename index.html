<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1c2b23">
<title>Het Bio Lijstje</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --board: #1c2b23;
    --board-light: #223a2d;
    --chalk: #f2efe6;
    --chalk-dim: #cfd6c9;
    --carrot: #e8823c;
    --tomato: #d95b4a;
    --sage: #7c9885;
    --lemon: #e4c56b;
    --line: rgba(242,239,230,0.14);
    --ah: #5b8fd6;
    --jumbo: #e0b23c;
    --lidl: #d9645a;
    --aldi: #7a6fd0;
    --ekoplaza: #6b9e4a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: radial-gradient(ellipse at top, var(--board-light), var(--board) 70%);
    color: var(--chalk);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 3rem;
  }
  .chalk-texture{
    position: fixed; inset: 0; pointer-events: none; opacity: 0.05; mix-blend-mode: overlay;
    background-image: radial-gradient(circle at 20% 30%, #fff 0.5px, transparent 0.5px),
                       radial-gradient(circle at 70% 60%, #fff 0.5px, transparent 0.5px);
    background-size: 4px 4px, 5px 5px;
  }
  header{
    padding: 2.2rem 1.4rem 1rem;
    text-align: center;
    position: relative;
  }
  .eyebrow{
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--sage);
    margin: 0 0 0.4rem;
  }
  h1{
    font-family: 'Caveat', cursive;
    font-weight: 700;
    font-size: 3rem;
    line-height: 0.95;
    margin: 0;
    color: var(--chalk);
    text-shadow: 0 0 18px rgba(242,239,230,0.15);
  }
  .updated{
    font-size: 0.78rem;
    color: var(--chalk-dim);
    margin-top: 0.6rem;
  }

  main{ max-width: 620px; margin: 0 auto; padding: 0 1rem; }
  @media (min-width: 760px){
    main{ max-width: 1180px; }
  }

  .summary-bar{
    display: flex; justify-content: center; gap: 1.4rem;
    margin: 0.4rem 0 1.6rem;
    flex-wrap: wrap;
  }
  .summary-stat{ text-align: center; }
  .summary-stat .n{
    font-family: 'Caveat', cursive; font-weight: 700; font-size: 1.9rem; line-height: 1;
    display: block;
  }
  .summary-stat .label{ font-size: 0.7rem; color: var(--chalk-dim); text-transform: uppercase; letter-spacing: 0.06em; }

  .store-columns{
    display: grid; grid-template-columns: 1fr; gap: 1.8rem;
  }
  @media (min-width: 760px){
    .store-columns{ grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); align-items: start; }
  }

  .store-section{ margin-bottom: 1.6rem; }
  @media (min-width: 760px){
    .store-section{ margin-bottom: 0; }
  }
  .store-header{
    display:flex; align-items:center; gap:0.7rem; margin-bottom: 0.9rem;
  }
  .store-badge{
    flex: 0 0 auto;
    width: 2.5rem; height: 2.5rem;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Caveat', cursive; font-weight: 700; font-size: 1.35rem;
    color: var(--board);
    box-shadow: 0 3px 8px rgba(0,0,0,0.25);
    transform: rotate(-4deg);
    border: 2px solid rgba(255,255,255,0.35);
  }
  .store-header h2{
    font-family: 'Caveat', cursive; font-weight: 700; font-size: 1.55rem;
    margin: 0; color: var(--chalk);
  }
  .store-header .count{
    font-size: 0.75rem; color: var(--chalk-dim); margin-left: 0.1rem;
  }

  .grid{
    display: grid; grid-template-columns: 1fr; gap: 0.7rem;
  }
  @media (min-width: 560px) and (max-width: 759px){
    .grid{ grid-template-columns: 1fr 1fr; }
  }

  .card{
    position: relative;
    background: var(--board-light);
    border-radius: 14px;
    padding: 0.85rem 1rem 0.95rem;
    border: 1px solid var(--line);
    border-left: 3px solid var(--card-accent, var(--sage));
  }
  .card .name{
    font-size: 0.96rem;
    font-weight: 600;
    line-height: 1.3;
  }
  .price-row{
    display:flex; align-items:baseline; gap:0.55rem; margin-top:0.5rem; flex-wrap:wrap;
  }
  .price-now{ font-size:1.1rem; font-weight:700; color: var(--carrot); }
  .price-was{ font-size:0.82rem; color: var(--chalk-dim); text-decoration: line-through; }
  .savings{
    margin-top:0.3rem; font-size:0.74rem; color: var(--sage);
  }
  .history-note{
    margin-top:0.4rem; font-size:0.74rem; padding-top:0.4rem;
    border-top: 1px dashed var(--line);
  }
  .history-good{ color: var(--sage); }
  .history-warn{ color: var(--tomato); }

  .empty-note{
    font-size: 0.82rem; color: var(--chalk-dim); font-style: italic;
    padding: 0.6rem 0;
  }

  .empty-state{
    text-align:center; padding: 2rem 1.5rem; color: var(--chalk-dim);
    background: var(--board-light);
    border-radius: 16px;
    border: 1px dashed var(--line);
  }
  .empty-state .big{ font-family:'Caveat', cursive; font-size:1.5rem; color: var(--chalk); display:block; margin-bottom:0.3rem;}
  code{
    background: rgba(0,0,0,0.25); padding:0.1rem 0.4rem; border-radius:5px; font-size:0.85em;
  }
  footer{
    text-align:center; font-size:0.72rem; color: var(--chalk-dim); opacity:0.6; margin-top:2rem;
  }
</style>
</head>
<body>
<div class="chalk-texture"></div>

<header>
  <p class="eyebrow">Deze week</p>
  <h1>Het Bio Lijstje</h1>
  <p class="updated" id="updated">nog niets geladen...</p>
</header>

<main>
  <div id="content">
    <div class="empty-state">
      <span class="big">Nog niets geladen</span>
      Even geduld...
    </div>
  </div>
</main>

<footer>
  Bijgewerkt elke zondag &middot; bio groente &amp; fruit-aanbiedingen<br>
  Aanbiedingen via <a href="https://www.prijsprofeet.nl/" style="color:inherit">PrijsProfeet</a>
  &amp; <a href="https://www.folderz.nl/" style="color:inherit">Folderz.nl</a>
</footer>

<script>
const STORE_COLORS = { AH: 'var(--ah)', Jumbo: 'var(--jumbo)', Lidl: 'var(--lidl)', Aldi: 'var(--aldi)', Ekoplaza: 'var(--ekoplaza)' };
const STORE_BADGES = { AH: 'ah', Jumbo: 'J', Lidl: 'L', Aldi: 'A', Ekoplaza: 'E' };
let data = null;

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('nl-NL', { weekday: 'long', day: 'numeric', month: 'long' }) +
         ' om ' + d.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
}

function fmtShortDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' });
}

function renderHistoryNote(item) {
  if (item.laagste_ooit_prijs === undefined || item.laagste_ooit_prijs === null) return '';
  if (item.actieprijs <= item.laagste_ooit_prijs) {
    return `<div class="history-note history-good">&#127942; Laagste prijs die ik zag (eerder ${item.eerder_gezien}x langsgekomen)</div>`;
  }
  const verschil = (item.actieprijs - item.laagste_ooit_prijs).toFixed(2);
  return `<div class="history-note history-warn">&#9888;&#65039; Eerder goedkoper: &euro;${item.laagste_ooit_prijs.toFixed(2)} op ${fmtShortDate(item.laagste_ooit_datum)} (nu &euro;${verschil} duurder)</div>`;
}

function renderAanbiedingCard(item, storeColor) {
  const savingsPct = item.normale_prijs
    ? Math.round((1 - item.actieprijs / item.normale_prijs) * 100)
    : null;
  return `
    <div class="card" style="--card-accent:${storeColor}">
      <div class="name">${item.naam.toLowerCase()}</div>
      <div class="price-row">
        <span class="price-now">&euro;${item.actieprijs.toFixed(2)}</span>
        ${item.normale_prijs ? `<span class="price-was">&euro;${item.normale_prijs.toFixed(2)}</span>` : ''}
      </div>
      ${savingsPct && savingsPct > 0 ? `<div class="savings">${savingsPct}% korting</div>` : ''}
      ${renderHistoryNote(item)}
    </div>`;
}

function render() {
  const content = document.getElementById('content');
  if (!data) {
    content.innerHTML = `
      <div class="empty-state">
        <span class="big">Nog geen data</span>
        Draai eerst <code>fetch_bio_prices.py</code> op je Pi, dan verschijnt hier
        de bio-update van deze week.
      </div>`;
    return;
  }

  document.getElementById('updated').textContent = 'Bijgewerkt: ' + fmtDate(data.laatst_bijgewerkt);

  const aanbiedingen = data.aanbiedingen || {};
  const stores = Object.keys(aanbiedingen);
  const totaal = stores.reduce((sum, s) => sum + (aanbiedingen[s] || []).length, 0);

  if (totaal === 0) {
    content.innerHTML = `
      <div class="empty-state">
        <span class="big">Geen bio-acties deze week</span>
        Bij AH, Jumbo en Lidl loopt op dit moment geen bio groente/fruit-actie.
        Dat gebeurt vaker dan je zou denken &mdash; acties zijn schaars, kom
        volgende week terug.
      </div>`;
    return;
  }

  const summaryHtml = `
    <div class="summary-bar">
      ${stores.map(s => `
        <div class="summary-stat">
          <span class="n" style="color:${STORE_COLORS[s] || 'var(--chalk)'}">${(aanbiedingen[s] || []).length}</span>
          <span class="label">${s}</span>
        </div>`).join('')}
    </div>`;

  const sectionsHtml = stores.map(s => {
    const items = aanbiedingen[s] || [];
    const color = STORE_COLORS[s] || 'var(--sage)';
    const body = items.length
      ? `<div class="grid">${items.map(i => renderAanbiedingCard(i, color)).join('')}</div>`
      : `<p class="empty-note">Geen bio-acties bij ${s} deze week.</p>`;
    return `
      <div class="store-section">
        <div class="store-header">
          <span class="store-badge" style="background:${color}" aria-hidden="true">${STORE_BADGES[s] || s[0]}</span>
          <h2>${s}</h2>
          <span class="count">${items.length} ${items.length === 1 ? 'actie' : 'acties'}</span>
        </div>
        ${body}
      </div>`;
  }).join('');

  content.innerHTML = `
    <p class="section-sub" style="text-align:center;color:var(--chalk-dim);font-size:0.78rem;margin:0 0 1rem;">
      Alle winkels in één overzicht &mdash; geen onderlinge vergelijking, want
      bio-acties zijn te schaars om eerlijk te matchen.
    </p>
    ${summaryHtml}
    <div class="store-columns">${sectionsHtml}</div>
  `;
}

fetch('data/bio_prices.json', { cache: 'no-store' })
  .then(r => { if (!r.ok) throw new Error('geen data'); return r.json(); })
  .then(json => { data = json; render(); })
  .catch(() => { data = null; render(); });

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
